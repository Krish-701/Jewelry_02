services:
  nana-jewellery:
    build: .
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - NEURALWATT_API_KEY=${NEURALWATT_API_KEY}
      - NEURALWATT_BASE_URL=${NEURALWATT_BASE_URL:-https://api.neuralwatt.com/v1}
      - NEURALWATT_MODEL=${NEURALWATT_MODEL:-kimi-k2.6}
      - FREEPIK_API_KEY=${FREEPIK_API_KEY}
      - FREEPIK_BASE_URL=${FREEPIK_BASE_URL:-https://api.magnific.com}
      - FREEPIK_IMAGE_MODEL=${FREEPIK_IMAGE_MODEL:-nano-banana-pro-flash}
    volumes:
      - nana-jewellery-data:/app/data
    networks:
      - dokploy-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.nana-jewellery-http.rule=Host(`design.krish.in.net`)
      - traefik.http.routers.nana-jewellery-http.entrypoints=web
      - traefik.http.services.nana-jewellery-svc.loadbalancer.server.port=3000
      - traefik.http.routers.nana-jewellery-http.service=nana-jewellery-svc
    restart: unless-stopped

volumes:
  nana-jewellery-data:

networks:
  dokploy-network:
    external: true
